<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirana AI | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { 500: '#4F46E5', 600: '#4338CA' } }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans flex h-screen overflow-hidden">

    <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col transition-all duration-300">
        <div class="h-16 flex items-center px-6 border-b border-slate-800 font-bold text-xl text-white tracking-wide">
            🛒 Kirana<span class="text-brand-500">AI</span>
        </div>
        <nav class="flex-1 py-4 space-y-1 px-3">
            <a href="#" class="flex items-center px-3 py-2.5 bg-brand-500 text-white rounded-lg shadow-sm">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                Dashboard
            </a>
            <a href="#" class="flex items-center px-3 py-2.5 rounded-lg hover:bg-slate-800 hover:text-white transition-colors">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                Stock In/Out
            </a>
            <a href="#" class="flex items-center px-3 py-2.5 rounded-lg hover:bg-slate-800 hover:text-white transition-colors">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                Procurement
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8">
            <h1 class="text-2xl font-semibold text-slate-800">Inventory Overview</h1>
            <div class="flex items-center space-x-4">
                <span class="text-sm font-medium text-slate-500">Last synced: Just now</span>
                <button onclick="openModal()" class="bg-brand-500 hover:bg-brand-600 text-white px-4 py-2 rounded-lg font-medium shadow-sm shadow-brand-500/30 transition-all transform hover:-translate-y-0.5">
                    + Add Transaction
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6 flex flex-col">
                    <span class="text-slate-500 text-sm font-medium mb-1">Total Investment</span>
                    <span class="text-3xl font-bold text-slate-800" id="total-investment">Loading...</span>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6 flex flex-col">
                    <span class="text-slate-500 text-sm font-medium mb-1">Total Revenue</span>
                    <span class="text-3xl font-bold text-slate-800" id="total-revenue">Loading...</span>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6 flex flex-col">
                    <span class="text-slate-500 text-sm font-medium mb-1">Current Balance</span>
                    <span class="text-3xl font-bold text-emerald-600" id="current-balance">Loading...</span>
                </div>
                <div class="bg-white rounded-xl shadow-sm border-t-4 border-t-red-500 border-x border-b border-slate-100 p-6 flex flex-col relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-10">
                        <svg class="w-12 h-12 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <span class="text-slate-500 text-sm font-medium mb-1">Pending Udhari</span>
                    <span class="text-3xl font-bold text-red-600" id="pending-udhari">Loading...</span>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center">
                    <h2 class="text-lg font-semibold text-slate-800">Current Stock Levels</h2>
                    <button class="text-brand-500 text-sm font-medium hover:text-brand-600">View Full Report &rarr;</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 text-slate-500 text-sm uppercase tracking-wider">
                                <th class="px-6 py-4 font-medium">Item Name</th>
                                <th class="px-6 py-4 font-medium">Category</th>
                                <th class="px-6 py-4 font-medium">In Stock</th>
                                <th class="px-6 py-4 font-medium">Status</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100 text-slate-700" id="inventory-table-body">
                            <tr>
                                <td colspan="4" class="px-6 py-4 text-center text-slate-500 font-medium">Loading stock data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>

        <div id="transaction-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300">
            <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden transform scale-95 transition-all duration-300" id="modal-content">
                <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                    <h3 class="text-lg font-semibold text-slate-800">Add New Transaction</h3>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 focus:outline-none transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <div class="p-6">
                    <form id="transaction-form" class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">Upload Bill/Receipt (Image or PDF)</label>
                            <input type="file" id="receipt-file" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-brand-50 file:text-brand-600 hover:file:bg-brand-100 transition-colors cursor-pointer" accept="image/*,.pdf">
                        </div>
                        
                        <div class="relative flex items-center py-2">
                            <div class="flex-grow border-t border-slate-200"></div>
                            <span class="flex-shrink-0 mx-4 text-slate-400 text-xs uppercase font-medium tracking-wider">OR</span>
                            <div class="flex-grow border-t border-slate-200"></div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">Manual Text Entry</label>
                            <textarea id="manual-entry" rows="3" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-shadow" placeholder="e.g., Bought 50kg Sugar at 40/kg..."></textarea>
                        </div>

                        <div class="pt-2">
                            <button type="button" onclick="submitTransaction()" class="w-full bg-brand-500 hover:bg-brand-600 text-white font-medium py-2.5 rounded-lg transition-all shadow-sm transform hover:-translate-y-0.5 flex justify-center items-center">
                                <span id="submit-text">Extract & Save Data</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script>
        // FIXED: Removed the double https:// 
        const API_BASE_URL = "https://autoscan-ai-psz1.onrender.com"; 

        // Modal Control Functions
        const modal = document.getElementById('transaction-modal');
        const modalContent = document.getElementById('modal-content');

        function openModal() {
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                document.getElementById('transaction-form').reset();
            }, 300);
        }

        // The Brain Connection: Submitting Data to FastAPI
        async function submitTransaction() {
            const fileInput = document.getElementById('receipt-file');
            const textInput = document.getElementById('manual-entry').value;
            const submitText = document.getElementById('submit-text');
            const submitBtn = submitText.parentElement;

            if (!fileInput.files[0] && !textInput.trim()) {
                alert("⚠️ Please upload a bill or type some text first.");
                return;
            }

            const apiKey = prompt("🔐 To process this, please enter your Google Gemini API Key:");
            if (!apiKey) return; 

            submitBtn.disabled = true;
            submitBtn.classList.add("opacity-75", "cursor-not-allowed");
            submitText.innerText = "🧠 AI is reading the bill...";
            
            const formData = new FormData();
            formData.append('mode', 'stock'); 
            formData.append('provider', 'Google Gemini');
            formData.append('api_key', apiKey);
            formData.append('model_name', 'gemini-1.5-flash'); 

            if (fileInput.files[0]) {
                formData.append('file', fileInput.files[0]);
            } else {
                formData.append('text_data', textInput);
            }

            try {
                const extractResponse = await fetch(`${API_BASE_URL}/api/extract`, {
                    method: 'POST',
                    body: formData
                });

                if (!extractResponse.ok) {
                    const err = await extractResponse.json();
                    throw new Error(err.detail || "AI Extraction failed");
                }

                const extractedItems = await extractResponse.json();
                
                submitText.innerText = "💾 Saving to Database...";
                const saveResponse = await fetch(`${API_BASE_URL}/api/save`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        mode: 'stock',
                        items: extractedItems
                    })
                });

                if (!saveResponse.ok) throw new Error("Database save failed");

                alert("✅ Success! The items have been added to your inventory.");
                closeModal();
                fetchDashboardData(); // Refresh the screen automatically!

            } catch (error) {
                alert("❌ Error: " + error.message);
                console.error(error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove("opacity-75", "cursor-not-allowed");
                submitText.innerText = "Extract & Save Data";
            }
        }

        // The Dashboard Display Logic
        async function fetchDashboardData() {
            try {
                const metricsResponse = await fetch(`${API_BASE_URL}/api/metrics`);
                const metrics = await metricsResponse.json();

                const formatRupee = (num) => num.toLocaleString('en-IN');

                document.getElementById('total-investment').innerText = `₹${formatRupee(metrics.investment)}`;
                document.getElementById('total-revenue').innerText = `₹${formatRupee(metrics.revenue)}`;
                
                const balancePrefix = metrics.balance >= 0 ? '+ ₹' : '- ₹';
                document.getElementById('current-balance').innerText = `${balancePrefix}${formatRupee(Math.abs(metrics.balance))}`;
                document.getElementById('pending-udhari').innerText = `₹${formatRupee(metrics.udhari)}`;

                const stockResponse = await fetch(`${API_BASE_URL}/api/stock`);
                const stockData = await stockResponse.json();

                const tbody = document.getElementById('inventory-table-body');
                tbody.innerHTML = ''; 

                stockData.forEach(item => {
                    let statusBadge = '';
                    if(item.Status === 'Healthy') {
                        statusBadge = `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-800">Healthy</span>`;
                    } else if(item.Status === 'Reorder Soon') {
                        statusBadge = `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-800">Reorder Soon</span>`;
                    } else {
                        statusBadge = `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800">Low Stock</span>`;
                    }

                    const stockClass = item.Remaining_Stock <= 5 ? 'text-red-600' : '';

                    const row = `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-6 py-4 font-medium text-slate-900">${item.item_name}</td>
                            <td class="px-6 py-4 text-slate-500">${item.category}</td>
                            <td class="px-6 py-4 font-semibold ${stockClass}">${item.Remaining_Stock} units</td>
                            <td class="px-6 py-4">${statusBadge}</td>
                        </tr>
                    `;
                    tbody.insertAdjacentHTML('beforeend', row);
                });

            } catch (error) {
                console.error("Error fetching data from backend:", error);
                document.getElementById('inventory-table-body').innerHTML = `<tr><td colspan="4" class="px-6 py-4 text-center text-red-500 font-medium">⚠️ Could not connect to the database server. Ensure Render is running.</td></tr>`;
            }
        }

        document.addEventListener('DOMContentLoaded', fetchDashboardData);
    </script>
</body>
</html>
