<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KiranaAI Pro | Master Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        .tab-content, .modal { display: none; }
        .tab-content.active, .modal.active { display: block; }
    </style>
</head>
<body class="bg-slate-50 font-['Inter'] text-slate-800 flex h-screen overflow-hidden">

    <aside class="w-72 bg-slate-900 text-slate-400 flex flex-col p-6 shadow-2xl">
        <div class="mb-10 text-white"><h1 class="text-2xl font-black italic">🛒 Kirana<span class="text-indigo-400">AI</span></h1></div>
        <nav class="space-y-1 flex-1">
            <button onclick="switchTab('dash')" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 transition">📊 Dashboard</button>
            <div class="py-2 text-[10px] font-bold text-slate-600 uppercase px-3 mt-4">Data Entry</div>
            <button onclick="openEntry('stock')" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 transition text-sm">📥 Inventory Input</button>
            <button onclick="openEntry('sales')" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 transition text-sm">📤 Sales Input</button>
            <button onclick="openEntry('suppliers')" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 transition text-sm">📑 Supplier Rates</button>
            <div class="py-2 text-[10px] font-bold text-indigo-500 uppercase px-3 mt-4">AI Intelligence</div>
            <button onclick="switchTab('forecast')" class="w-full text-left p-3 rounded-lg hover:bg-indigo-900/40 text-indigo-300 transition text-sm font-bold">🔮 Weekly Forecast</button>
            <button onclick="switchTab('smart')" class="w-full text-left p-3 rounded-lg hover:bg-indigo-900/40 text-indigo-300 transition text-sm font-bold">🛒 Smart Order</button>
        </nav>
        <div class="pt-6 border-t border-slate-800 space-y-2">
            <button onclick="openModal('settings')" class="w-full p-2 text-xs bg-slate-800 rounded">⚙️ AI Config</button>
            <button onclick="runSimulation()" class="w-full p-2 text-xs bg-indigo-900/30 text-indigo-400 rounded">🧪 Simulation</button>
            <button onclick="resetSystem()" class="w-full p-2 text-xs bg-red-900/10 text-red-500 rounded">🗑️ Reset System</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden bg-white">
        <header class="h-16 border-b flex items-center justify-between px-8 bg-white/80">
            <h2 id="header-title" class="text-xl font-extrabold text-slate-900">Dashboard</h2>
            <div class="flex items-center space-x-2 text-[10px] font-bold px-3 py-1 rounded-full bg-emerald-50 text-emerald-600 uppercase animate-pulse">
                <span>System Live</span>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <div id="tab-dash" class="tab-content active">
                <div class="grid grid-cols-4 gap-6 mb-10" id="metrics-grid"></div>
                <div class="bg-white rounded-3xl border border-slate-100 overflow-hidden shadow-sm">
                    <table class="w-full text-left"><thead class="bg-slate-50 text-[10px] font-bold text-slate-400 uppercase"><tr><th class="p-4">Item</th><th class="p-4 text-right">In Stock</th></tr></thead><tbody id="stock-table"></tbody></table>
                </div>
            </div>
            <div id="tab-forecast" class="tab-content"><div id="forecast-grid" class="grid grid-cols-3 gap-6"></div></div>
            <div id="tab-smart" class="tab-content"><div id="order-list" class="space-y-4"></div></div>
        </div>
    </main>

    <div id="modal-entry" class="modal fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50">
        <div class="bg-white w-[500px] mx-auto mt-20 rounded-3xl p-8 shadow-2xl">
            <h3 id="entry-title" class="text-2xl font-bold mb-6">Data Entry</h3>
            
            <div id="entry-step-1" class="space-y-4">
                <select id="input-type" class="w-full border p-3 rounded-xl bg-slate-50 text-sm">
                    <option value="manual">Manual Text Entry</option>
                    <option value="file">Image/PDF Upload (AI OCR)</option>
                    <option value="csv">CSV/Excel File Upload</option>
                </select>
                <div id="supplier-extras" class="hidden space-y-2">
                    <input id="sup-name" placeholder="Supplier Name" class="w-full border p-3 rounded-xl text-sm">
                    <input id="sup-dist" type="number" placeholder="Distance (km)" class="w-full border p-3 rounded-xl text-sm">
                </div>
                <textarea id="entry-text" class="w-full border p-4 rounded-xl h-32 text-sm" placeholder="Paste data here..."></textarea>
                <input type="file" id="entry-file" class="hidden">
                <button onclick="processEntry()" id="btn-process" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">🔍 Extract with AI</button>
            </div>

            <div id="entry-step-2" class="hidden space-y-4">
                <div class="bg-emerald-50 p-4 rounded-xl text-xs font-mono max-h-40 overflow-auto" id="entry-preview"></div>
                <button onclick="saveEntry()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold">💾 Confirm & Save to Cloud</button>
                <button onclick="closeModals()" class="w-full text-slate-400 text-sm">Cancel</button>
            </div>
        </div>
    </div>

    <div id="modal-settings" class="modal fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50">
        <div class="bg-white w-[400px] mx-auto mt-20 rounded-3xl p-8 shadow-2xl space-y-4">
            <h3 class="text-xl font-bold">AI Configuration</h3>
            <select id="ai-provider" class="w-full border p-3 rounded-xl text-sm" onchange="fetchModels()">
                <option value="Google Gemini">Google Gemini</option>
                <option value="Groq">Groq</option>
            </select>
            <input id="ai-key" type="password" placeholder="API Key" class="w-full border p-3 rounded-xl text-sm">
            <button onclick="fetchModels()" class="w-full bg-slate-800 text-white py-2 rounded-xl text-xs">Discover Models</button>
            <select id="ai-model" class="w-full border p-3 rounded-xl text-sm"></select>
            <button onclick="saveSettings()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">Save Settings</button>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://autoscan-ai-psz1.onrender.com";
        let currentMode = '';
        let extractedData = null;

        // --- DASHBOARD REFRESH ---
        async function refresh() {
            const res = await fetch(`${API_BASE_URL}/api/dashboard`);
            const data = await res.json();
            const fmt = (v) => `₹${v.toLocaleString('en-IN')}`;
            
            document.getElementById('metrics-grid').innerHTML = `
                <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100"><p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Investment</p><h3 class="text-3xl font-black">${fmt(data.metrics.investment)}</h3></div>
                <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100"><p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Revenue</p><h3 class="text-3xl font-black">${fmt(data.metrics.revenue)}</h3></div>
                <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100"><p class="text-emerald-400 text-[10px] font-bold uppercase mb-1">Balance</p><h3 class="text-3xl font-black text-emerald-600">${fmt(data.metrics.balance)}</h3></div>
                <div class="bg-red-50 p-6 rounded-3xl border border-red-100"><p class="text-red-400 text-[10px] font-bold uppercase mb-1">Udhari</p><h3 class="text-3xl font-black text-red-600">${fmt(data.metrics.udhari)}</h3></div>
            `;

            document.getElementById('stock-table').innerHTML = Object.entries(data.stock).map(([item, qty]) => `
                <tr><td class="p-4 font-semibold">${item}</td><td class="p-4 text-right font-mono">${qty} units</td></tr>
            `).join('');
        }

        // --- TABS ---
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            if(id === 'forecast') loadForecast();
            if(id === 'smart') loadSmartOrders();
        }

        // --- DATA ENTRY FLOW ---
        function openEntry(mode) {
            currentMode = mode;
            document.getElementById('entry-title').innerText = `Add ${mode.charAt(0).toUpperCase() + mode.slice(1)}`;
            document.getElementById('supplier-extras').style.display = (mode === 'suppliers') ? 'block' : 'none';
            document.getElementById('entry-step-1').classList.remove('hidden');
            document.getElementById('entry-step-2').classList.add('hidden');
            document.getElementById('modal-entry').classList.add('active');
        }

        async function processEntry() {
            const btn = document.getElementById('btn-process');
            btn.innerText = "🧠 AI is Thinking..."; btn.disabled = true;
            
            const formData = new FormData();
            formData.append('mode', currentMode);
            formData.append('provider', localStorage.getItem('ki_provider'));
            formData.append('api_key', localStorage.getItem('ki_key'));
            formData.append('model_name', localStorage.getItem('ki_model'));
            formData.append('text_data', document.getElementById('entry-text').value);

            const res = await fetch(`${API_BASE_URL}/api/extract`, { method: 'POST', body: formData });
            extractedData = await res.json();
            
            document.getElementById('entry-preview').innerText = JSON.stringify(extractedData, null, 2);
            document.getElementById('entry-step-1').classList.add('hidden');
            document.getElementById('entry-step-2').classList.remove('hidden');
            btn.innerText = "Extract with AI"; btn.disabled = false;
        }

        async function saveEntry() {
            const payload = {
                mode: currentMode,
                items: extractedData,
                supplier_name: document.getElementById('sup-name').value,
                distance_km: document.getElementById('sup-dist').value
            };
            await fetch(`${API_BASE_URL}/api/save`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)});
            closeModals(); refresh(); alert("✅ Saved to Cloud!");
        }

        // --- UTILS ---
        function openModal(id) { document.getElementById('modal-' + id).classList.add('active'); }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }
        
        async function fetchModels() {
            const prov = document.getElementById('ai-provider').value;
            const key = document.getElementById('ai-key').value;
            const res = await fetch(`${API_BASE_URL}/api/models`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({provider: prov, api_key: key})});
            const data = await res.json();
            document.getElementById('ai-model').innerHTML = data.models.map(m => `<option value="${m}">${m}</option>`).join('');
        }

        function saveSettings() {
            localStorage.setItem('ki_provider', document.getElementById('ai-provider').value);
            localStorage.setItem('ki_key', document.getElementById('ai-key').value);
            localStorage.setItem('ki_model', document.getElementById('ai-model').value);
            closeModals();
        }

        document.addEventListener('DOMContentLoaded', refresh);
    </script>
</body>
</html>
