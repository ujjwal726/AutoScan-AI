<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KiranaAI Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style> .tab-content { display: none; } .tab-content.active { display: block; } </style>
</head>
<body class="bg-slate-50 font-['Inter'] text-slate-800 flex h-screen overflow-hidden">

    <aside class="w-72 bg-slate-900 text-slate-400 flex flex-col p-6 shadow-2xl">
        <div class="mb-10 text-white"><h1 class="text-2xl font-black italic">🛒 Kirana<span class="text-indigo-400">AI</span></h1></div>
        
        <nav class="space-y-1 flex-1">
            <button onclick="switchTab('dash')" class="w-full flex items-center p-3 rounded-lg hover:bg-slate-800 hover:text-white transition">📊 Dashboard</button>
            <div class="py-2 text-[10px] font-bold text-slate-600 uppercase px-3 mt-4">Data Entry</div>
            <button onclick="openEntry('stock')" class="w-full flex items-center p-3 rounded-lg hover:bg-slate-800 hover:text-white transition text-sm">📥 Inventory In</button>
            <button onclick="openEntry('sales')" class="w-full flex items-center p-3 rounded-lg hover:bg-slate-800 hover:text-white transition text-sm">📤 Sales Out</button>
            <button onclick="switchTab('sup')" class="w-full flex items-center p-3 rounded-lg hover:bg-slate-800 hover:text-white transition text-sm">🏭 Supplier Data</button>
            
            <div class="py-2 text-[10px] font-bold text-indigo-500 uppercase px-3 mt-4">AI Intelligence</div>
            <button onclick="switchTab('forecast')" class="w-full flex items-center p-3 rounded-lg hover:bg-indigo-900/40 text-indigo-300 transition text-sm font-bold">🔮 Weekly Forecast</button>
            <button onclick="switchTab('smart')" class="w-full flex items-center p-3 rounded-lg hover:bg-indigo-900/40 text-indigo-300 transition text-sm font-bold">🛒 Smart Order</button>
        </nav>

        <div class="pt-6 border-t border-slate-800 space-y-2">
            <button onclick="openSettings()" class="w-full p-2 text-xs bg-slate-800 rounded hover:bg-slate-700 transition">⚙️ AI Config</button>
            <button onclick="runSimulation()" class="w-full p-2 text-xs bg-indigo-900/30 text-indigo-400 rounded hover:bg-indigo-900/50 transition">🧪 Simulation</button>
            <button onclick="resetAll()" class="w-full p-2 text-xs bg-red-900/10 text-red-500 rounded hover:bg-red-900/20 transition">🗑️ Reset Data</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden bg-white">
        <header class="h-16 border-b flex items-center justify-between px-8 bg-white/80 backdrop-blur-md">
            <h2 id="header-title" class="text-xl font-extrabold text-slate-900">Dashboard</h2>
            <div class="flex items-center space-x-2 text-[10px] font-bold px-3 py-1 rounded-full bg-emerald-50 text-emerald-600 uppercase">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span><span>System Online</span>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <div id="tab-dash" class="tab-content active">
                <div class="grid grid-cols-4 gap-6 mb-10">
                    <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100">
                        <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Investment</p>
                        <h3 id="stat-inv" class="text-3xl font-black">₹0</h3>
                    </div>
                    <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100">
                        <p class="text-slate-400 text-[10px] font-bold uppercase mb-1">Revenue</p>
                        <h3 id="stat-rev" class="text-3xl font-black">₹0</h3>
                    </div>
                    <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100">
                        <p class="text-emerald-400 text-[10px] font-bold uppercase mb-1">Balance</p>
                        <h3 id="stat-bal" class="text-3xl font-black text-emerald-600">₹0</h3>
                    </div>
                    <div class="bg-red-50 p-6 rounded-3xl border border-red-100">
                        <p class="text-red-400 text-[10px] font-bold uppercase mb-1">Udhari</p>
                        <h3 id="stat-udh" class="text-3xl font-black text-red-600">₹0</h3>
                    </div>
                </div>
                <div class="bg-white rounded-3xl border border-slate-100 overflow-hidden shadow-sm">
                    <div class="p-6 border-b font-bold bg-slate-50/50">Current Stock Inventory</div>
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50/50 text-slate-400 uppercase text-[10px] font-bold"><tr><th class="p-4">Item Name</th><th class="p-4 text-right">Quantity In Stock</th></tr></thead>
                        <tbody id="stock-table" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>

            <div id="tab-forecast" class="tab-content">
                <h3 class="text-3xl font-black mb-8">Weekly Demand Forecast</h3>
                <div id="forecast-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

            <div id="tab-smart" class="tab-content">
                <h3 class="text-3xl font-black mb-2">Smart Procurement</h3>
                <p class="text-slate-400 text-sm mb-10">Optimizing orders based on forecast and lowest landed cost (Price + Transport).</p>
                <div id="order-list" class="space-y-4"></div>
            </div>
        </div>
    </main>

    <script>
        const API_BASE_URL = "https://autoscan-ai-psz1.onrender.com";
        
        async function refreshData() {
            const res = await fetch(`${API_BASE_URL}/api/dashboard`);
            const data = await res.json();
            const fmt = (v) => v.toLocaleString('en-IN');
            document.getElementById('stat-inv').innerText = `₹${fmt(data.metrics.investment)}`;
            document.getElementById('stat-rev').innerText = `₹${fmt(data.metrics.revenue)}`;
            document.getElementById('stat-bal').innerText = `₹${fmt(data.metrics.balance)}`;
            document.getElementById('stat-udh').innerText = `₹${fmt(data.metrics.udhari)}`;
            
            document.getElementById('stock-table').innerHTML = Object.entries(data.stock).map(([item, qty]) => `
                <tr><td class="p-4 font-semibold">${item}</td><td class="p-4 text-right font-mono">${qty} units</td></tr>
            `).join('');
        }

        async function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            if(id === 'forecast') loadForecast();
            if(id === 'smart') loadSmartOrders();
        }

        async function loadForecast() {
            const res = await fetch(`${API_BASE_URL}/api/forecast`);
            const data = await res.json();
            document.getElementById('forecast-grid').innerHTML = data.map(f => `
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                    <p class="text-lg font-bold">${f.item_name}</p>
                    <div class="mt-4 flex justify-between text-xs"><span class="text-slate-400">Predicted Demand</span><span class="font-bold">${f.demand_7d}</span></div>
                    <div class="mt-4 text-center"><p class="text-[10px] text-slate-400 uppercase">Suggested Order</p><p class="text-3xl font-black ${f.suggested_order > 0 ? 'text-indigo-600' : 'text-slate-200'}">${f.suggested_order}</p></div>
                </div>
            `).join('');
        }

        async function loadSmartOrders() {
            const res = await fetch(`${API_BASE_URL}/api/smart-order`);
            const data = await res.json();
            const list = document.getElementById('order-list');
            if(data.length === 0) { list.innerHTML = `<div class="p-10 text-center text-slate-400">No pending orders. Stock is healthy!</div>`; return; }
            list.innerHTML = data.map(o => `
                <div class="bg-white p-6 rounded-3xl border border-slate-100 flex items-center justify-between">
                    <div><p class="font-bold text-lg">${o.qty}x ${o.item}</p><p class="text-xs text-slate-400">Supplier: ${o.supplier} | Rate: ₹${o.price}</p></div>
                    <button onclick="window.open('https://wa.me/${o.contact}?text=Order:%20${o.qty}%20${o.item}')" class="bg-emerald-500 text-white px-6 py-2 rounded-full font-bold text-xs hover:bg-emerald-600 transition">Order via WA</button>
                </div>
            `).join('');
        }

        async function runSimulation() {
            if(!confirm("Inject 30 days of sample data?")) return;
            await fetch(`${API_BASE_URL}/api/simulate`, {method: 'POST'});
            alert("Simulation complete! Data is now in your cloud database.");
            refreshData();
        }

        async function resetAll() {
            if(!confirm("DELETE ALL CLOUD DATA?")) return;
            await fetch(`${API_BASE_URL}/api/reset`, {method: 'POST'});
            refreshData();
        }

        document.addEventListener('DOMContentLoaded', () => { refreshData(); });
    </script>
</body>
</html>
